name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyA64M1lcWOof1dYcbuELgKt45wc7aCQbb0
          VITE_FIREBASE_AUTH_DOMAIN: boluo-account.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: boluo-account
          VITE_FIREBASE_STORAGE_BUCKET: boluo-account.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "745138770663"
          VITE_FIREBASE_APP_ID: 1:745138770663:web:9399155f6e7d8984fdc842
          VITE_BASE_PATH: /boluo-account/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
